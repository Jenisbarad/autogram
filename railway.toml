[build]
builder = "NIXPACKS"

# System packages needed for FFmpeg and sharp
[build.env]
NIXPACKS_PKGS = "ffmpeg ffmpeg-dev postgresql-client python3 make g++"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
# Disable serverless to keep the app running
restartPolicyMaxRetries = 10
