# Railway Configuration for Insta-Autogram

[build]
# Use Nixpacks builder (best for Node.js apps with native dependencies)
builder = "NIXPACKS"
# Build from backend directory
buildCommand = "cd backend && npm ci"
watchPaths = ["backend/src/**"]

[deploy]
# Health check configuration
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Disable serverless to keep app running 24/7
# This is important for Telegram webhooks and queue workers
disableServerless = true

[deploy.env]
PORT = "4000"
NODE_ENV = "production"
